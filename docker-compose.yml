version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
      - PRIVACY_MODE=${PRIVACY_MODE:-off}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_AGENT_BACKEND_URL=http://localhost:3001
    depends_on:
      agent:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile.agent
    env_file: .env
    entrypoint: ["node", "packages/agent/dist/index.js"]
    command: ["echo", "Seed complete"]
    profiles: ["seed"]
    depends_on:
      agent:
        condition: service_healthy
